name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce?
      description: Provide a minimal code snippet or steps to reproduce the issue.
      placeholder: |
        1. Connect with mongosh...
        2. Run command...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output (run MoG with `MOG_LOG_LEVEL=debug`).
      render: shell
  - type: input
    id: version
    attributes:
      label: MoG Version
      description: Run `go run ./cmd/mog --version` or provide the commit hash.
    validations:
      required: true
